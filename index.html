<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spec Taggerz</title>
<!-- Link to your CSS stylesheet -->
<link rel="stylesheet" href="Site.css" />
</head>
<body>

<h1>Spec Taggerz</h1>
<p class="description">Run, jump, and have fun in Spec Taggerz!</p>

<div class="images">
  <!-- Replace these src with your actual image URLs -->
  <img src="Screenshot 2026-01-14 172034_2560x1440.png" alt="Game Image 1" />
  <img src="Screenshot 2026-01-14 172024_2560x1440.png" alt="Game Image 2" />
  <img src="Screenshot 2026-01-14 172010_2560x1440.png" alt="Game Image 3" />
</div>

<div class="buttons">
  <button id="downloadBtn">Download Game</button>
</div>

<!-- Username setup and change button -->
<div id="auth-section">
  <h2>Set Your Unique Username</h2>
  <input type="text" id="usernameInput" placeholder="Enter username" />
  <button id="saveUsernameBtn">Save Username</button>
  <button id="changeUsernameBtn" style="margin-left:10px;">Change Username</button>
  <p id="statusMsg"></p>
</div>

<!-- Comments display -->
<div id="comments-section" style="display:none;">
  <h2>Comments</h2>
  <p>Logged in as: <span id="usernameDisplay"></span></p>
  <form id="commentForm">
    <input type="text" id="commentInput" placeholder="Write a comment..." required />
    <button type="submit">Post</button>
  </form>
  <div id="commentsList"></div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  // Firebase configuration (replace with your actual config)
const firebaseConfig = {
  apiKey: "AIzaSyAHhMbF6CuI22_4FbTk0of4TNxMtgmcqDg",
  authDomain: "spec-taggerz.firebaseapp.com",
  databaseURL: "https://spec-taggerz-default-rtdb.firebaseio.com", // Replace with your actual database URL
  projectId: "spec-taggerz",
  storageBucket: "spec-taggerz.appspot.com",
  messagingSenderId: "927743332289",
  appId: "1:927743332289:web:0bb2a09f224f4999f12940",
  measurementId: "G-N947ZTPRBZ"
};

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getDatabase, ref, push, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const statusMsg = document.getElementById('statusMsg');
  const usernameDisplay = document.getElementById('usernameDisplay');
  const usernameInput = document.getElementById('usernameInput');
  const saveUsernameBtn = document.getElementById('saveUsernameBtn');
  const changeUsernameBtn = document.getElementById('changeUsernameBtn');
  const commentsSection = document.getElementById('comments-section');
  const authSection = document.getElementById('auth-section');
  const commentsList = document.getElementById('commentsList');
  const commentForm = document.getElementById('commentForm');
  const commentInput = document.getElementById('commentInput');

  let username = localStorage.getItem('username') || '';

  // Check if username exists
  if (username) {
    showComments();
  } else {
    showUsernameSetup();
  }

  function showUsernameSetup() {
    authSection.style.display = 'block';
    commentsSection.style.display = 'none';
    statusMsg.textContent = "Please set your unique username.";
  }

  function showComments() {
    authSection.style.display = 'none';
    commentsSection.style.display = 'block';
    usernameDisplay.textContent = username;
    loadComments();
  }

  // Save username with uniqueness check
  saveUsernameBtn.onclick = async () => {
    const newUsername = usernameInput.value.trim();
    if (!newUsername) {
      alert("Please enter a username");
      return;
    }
    // Check if username is taken
    const usernameRef = ref(db, `usernames/${newUsername}`);
    const snapshot = await get(usernameRef);
    if (snapshot.exists()) {
      alert("This username is already taken. Please choose another one.");
      return;
    }
    // Save username as taken
    await set(usernameRef, { takenBy: "someUserId" });
    // Save locally
    username = newUsername;
    localStorage.setItem('username', username);
    showComments();
  };

  // Change username
  changeUsernameBtn.onclick = () => {
    // Show the input for new username
    showUsernameSetup();
    document.getElementById('statusMsg').textContent = "Enter a new username.";
  };

  // Load comments
  function loadComments() {
    const commentsRef = ref(db, 'comments');
    onValue(commentsRef, snapshot => {
      commentsList.innerHTML = '';
      snapshot.forEach(child => {
        const comment = child.val();
        const div = document.createElement('div');
        div.className = 'comment';
        div.innerHTML = `<strong>${comment.username}:</strong> ${comment.text}`;
        commentsList.appendChild(div);
      });
    });
  }

  // Post comment
  document.getElementById('commentForm').onsubmit = e => {
    e.preventDefault();
    if (!username) {
      alert("Please set your username first.");
      return;
    }
    const text = commentInput.value.trim();
    if (!text) return;
    push(ref(db, 'comments'), { text: text, username: username });
    commentInput.value = '';
  };

  // Download button
  document.getElementById('downloadBtn').onclick = () => {
    window.location.href = "https://www.meta.com/experiences/spec-taggerz-v2/1173072012561564/";
  };
</script>

<!-- Footer -->
<div style="text-align: center; margin-top: 20px; font-style: italic; color: white;">
  Made by evil90
</div>

</body>
</html>
