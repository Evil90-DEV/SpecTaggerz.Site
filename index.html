<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spec Taggerz with Firebase</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="Site.css" />
</head>
<body>

<h1>Spec Taggerz</h1>
<p class="description">Run, jump, and have fun in Spec Taggerz!</p>

<div class="images">
  <!-- Replace these src with your actual image URLs -->
  <img src="Screenshot 2026-01-14 172034_2560x1440.png" alt="Game Image 1" />
  <img src="Screenshot 2026-01-14 172024_2560x1440.png" alt="Game Image 2" />
  <img src="Screenshot 2026-01-14 172010_2560x1440.png" alt="Game Image 3" />
</div>

<div class="buttons">
  <button id="downloadBtn">Download Game</button>
</div>

<div id="auth-section">
  <h2>Sign In</h2>
  <button id="signInBtn">Sign in Anonymously</button>
  <p id="authStatus"></p>
</div>

<div id="comments-section" style="display:none;">
  <h2>Comments</h2>
  <p>Logged in as: <span id="usernameDisplay"></span></p>
  <form id="commentForm">
    <input type="text" id="commentInput" placeholder="Write a comment..." required />
    <button type="submit">Post</button>
  </form>
  <div id="commentsList"></div>
</div>

<script>
  // Your Firebase configuration (replace with your own)
const firebaseConfig = {
  apiKey: "AIzaSyAHhMbF6CuI22_4FbTk0of4TNxMtgmcqDg",
  authDomain: "spec-taggerz.firebaseapp.com",
  databaseURL: "https://spec-taggerz-default-rtdb.firebaseio.com", // Replace with your actual database URL
  projectId: "spec-taggerz",
  storageBucket: "spec-taggerz.appspot.com",
  messagingSenderId: "927743332289",
  appId: "1:927743332289:web:0bb2a09f224f4999f12940",
  measurementId: "G-N947ZTPRBZ"
};

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const signInBtn = document.getElementById('signInBtn');
  const authStatus = document.getElementById('authStatus');
  const usernameDisplay = document.getElementById('usernameDisplay');
  const commentsSection = document.getElementById('comments-section');

  let currentUser = null;

  // Sign in anonymously
  signInBtn.onclick = () => {
    auth.signInAnonymously()
      .then(() => {
        currentUser = auth.currentUser;
        showComments();
      })
      .catch(error => {
        authStatus.textContent = "Error signing in: " + error.message;
      });
  };

  function showComments() {
    document.getElementById('auth-section').style.display = 'none';
    commentsSection.style.display = 'block';
    // Display user ID as username (or implement a username system)
    usernameDisplay.textContent = currentUser.uid;
    loadComments();
  }

  // Load comments from Firestore
  function loadComments() {
    const commentsRef = db.collection('comments').orderBy('timestamp', 'asc');
    commentsRef.onSnapshot(snapshot => {
      const commentsList = document.getElementById('commentsList');
      commentsList.innerHTML = '';
      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement('div');
        div.className = 'comment';
        div.textContent = data.username + ": " + data.text;
        commentsList.appendChild(div);
      });
    });
  }

  // Post comment
  document.getElementById('commentForm').onsubmit = (e) => {
    e.preventDefault();
    const commentText = document.getElementById('commentInput').value.trim();
    if (!commentText || !currentUser) return;

    db.collection('comments').add({
      username: currentUser.uid,
      text: commentText,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('commentInput').value = '';
  };

  // Download button
document.getElementById('downloadBtn').onclick = () => {
  window.location.href = "https://www.meta.com/experiences/spec-taggerz-v2/1173072012561564/";
};
</script>

</body>
</html>
