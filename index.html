<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spec Taggerz</title>
<link rel="stylesheet" href="Site.css" />
</head>
<body>

<h1>Spec Taggerz</h1>
<p class="description">Run, jump, and have fun in Spec Taggerz!</p>

<div class="images">
  <img src="https://via.placeholder.com/300x200?text=Game+Image+1" alt="Game Image 1" />
  <img src="https://via.placeholder.com/300x200?text=Game+Image+2" alt="Game Image 2" />
  <img src="https://via.placeholder.com/300x200?text=Game+Image+3" alt="Game Image 3" />
</div>

<div class="buttons">
  <button id="downloadBtn">Download Game</button>
</div>

<div id="auth-section">
  <h2>Set Your Username</h2>
  <p>Select from allowed usernames:</p>
  <select id="usernameSelect">
    <option value="">--Choose a username--</option>
    <option value="Alice">Alice</option>
    <option value="Bob">Bob</option>
    <option value="Charlie">Charlie</option>
  </select>
  <button id="saveUsernameBtn">Save Username</button>
  <p id="statusMsg"></p>
</div>

<div id="comments-section" style="display:none;">
  <h2>Comments</h2>
  <p>Logged in as: <span id="usernameDisplay"></span></p>
  <form id="commentForm">
    <input type="text" id="commentInput" placeholder="Write a comment..." required />
    <button type="submit">Post</button>
  </form>
  <div id="commentsList"></div>
</div>

<script>
// List of allowed usernames
const allowedUsernames = ["Alice", "Bob", "Charlie"];

const usernameSelect = document.getElementById('usernameSelect');
const saveBtn = document.getElementById('saveUsernameBtn');
const statusMsg = document.getElementById('statusMsg');
const usernameDisplay = document.getElementById('usernameDisplay');
const commentsSection = document.getElementById('comments-section');

let username = localStorage.getItem('username');

if (username && allowedUsernames.includes(username)) {
  showComments();
} else {
  // Not set or invalid, show auth section
  document.getElementById('auth-section').style.display = 'block';
  commentsSection.style.display = 'none';
}

// When user clicks save, verify selection
saveBtn.onclick = () => {
  const selectedName = usernameSelect.value;
  if (!selectedName) {
    alert("Please select a username from the list.");
    return;
  }
  // Check if selected username is allowed
  if (!allowedUsernames.includes(selectedName)) {
    alert("This username is not allowed. Please select a valid username from the list.");
    return;
  }
  // Save username
  username = selectedName;
  localStorage.setItem('username', username);
  showComments();
};

// Show comments section
function showComments() {
  document.getElementById('auth-section').style.display = 'none';
  commentsSection.style.display = 'block';
  document.getElementById('usernameDisplay').textContent = username;
  loadComments();
}

// Load comments from localStorage (for demo)
function loadComments() {
  const comments = JSON.parse(localStorage.getItem('comments')) || [];
  const commentsList = document.getElementById('commentsList');
  commentsList.innerHTML = '';
  comments.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comment';
    div.textContent = c;
    commentsList.appendChild(div);
  });
}

// Add new comment
document.getElementById('commentForm').onsubmit = (e) => {
  e.preventDefault();
  const commentText = document.getElementById('commentInput').value.trim();
  if (!commentText) return;
  let comments = JSON.parse(localStorage.getItem('comments')) || [];
  comments.push(`${username}: ${commentText}`);
  localStorage.setItem('comments', JSON.stringify(comments));
  loadComments();
  document.getElementById('commentInput').value = '';
};

// Download button
document.getElementById('downloadBtn').onclick = () => {
  window.location.href = "https://www.meta.com/experiences/spec-taggerz-v2/1173072012561564/";
};
</script>

</body>
</html>
