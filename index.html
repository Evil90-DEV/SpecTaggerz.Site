<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spec Taggerz - Login System</title>
<link rel="stylesheet" href="Site.css" />
</head>
<body>

<h1>Spec Taggerz</h1>
<p class="description">Run, jump, and have fun in Spec Taggerz!</p>

<div class="images">
  <img src="Screenshot 2026-01-14 172034_2560x1440.png" alt="Game Image 1" />
  <img src="Screenshot 2026-01-14 172024_2560x1440.png" alt="Game Image 2" />
  <img src="Screenshot 2026-01-14 172010_2560x1440.png" alt="Game Image 3" />
</div>

<div class="buttons">
  <button id="downloadBtn">Download Game</button>
</div>

<!-- Login/Register Section -->
<div id="auth-section">
  <h2>Login or Register</h2>
  <input type="text" id="auth-username" placeholder="Username" />
  <input type="password" id="auth-password" placeholder="Password" />
  <button id="loginBtn">Login</button>
  <button id="registerBtn">Register</button>
  <p id="auth-status"></p>
</div>

<!-- Main App after login -->
<div id="app-section" style="display:none;">
  <h2>Welcome, <span id="user-name-display"></span></h2>
  <button id="logoutBtn">Logout</button>
  
  <!-- Comment system -->
  <h3>Comments</h3>
  <form id="commentForm">
    <input type="text" id="commentInput" placeholder="Write a comment..." required />
    <button type="submit">Post</button>
  </form>
  <div id="commentsList"></div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  // Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAHhMbF6CuI22_4FbTk0of4TNxMtgmcqDg",
  authDomain: "spec-taggerz.firebaseapp.com",
  databaseURL: "https://spec-taggerz-default-rtdb.firebaseio.com", // Replace with your actual database URL
  projectId: "spec-taggerz",
  storageBucket: "spec-taggerz.appspot.com",
  messagingSenderId: "927743332289",
  appId: "1:927743332289:web:0bb2a09f224f4999f12940",
  measurementId: "G-N947ZTPRBZ"
};

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getDatabase, ref, push, onValue, get, set } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Elements
  const authSection = document.getElementById('auth-section');
  const appSection = document.getElementById('app-section');
  const authStatus = document.getElementById('auth-status');
  const usernameInput = document.getElementById('auth-username');
  const passwordInput = document.getElementById('auth-password');
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');
  const userNameDisplay = document.getElementById('user-name-display');

  const commentsList = document.getElementById('commentsList');
  const commentForm = document.getElementById('commentForm');
  const commentInput = document.getElementById('commentInput');

  const logoutBtn = document.getElementById('logoutBtn');

  let currentUser = null;

  // Load user session
  const savedUser = localStorage.getItem('user');
  if (savedUser) {
    currentUser = JSON.parse(savedUser);
    showApp();
  }

  // Login
  document.getElementById('loginBtn').onclick = async () => {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    if (!username || !password) {
      authStatus.textContent = "Enter username and password.";
      return;
    }
    const userRef = ref(db, `users/${username}`);
    const snapshot = await get(userRef);
    if (snapshot.exists()) {
      const userData = snapshot.val();
      if (userData.password === password) {
        // Successful login
        currentUser = { username, password };
        localStorage.setItem('user', JSON.stringify(currentUser));
        showApp();
      } else {
        authStatus.textContent = "Incorrect password.";
      }
    } else {
      authStatus.textContent = "User does not exist.";
    }
  };

  // Register
  document.getElementById('registerBtn').onclick = async () => {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    if (!username || !password) {
      authStatus.textContent = "Enter username and password.";
      return;
    }
    const userRef = ref(db, `users/${username}`);
    const snapshot = await get(userRef);
    if (snapshot.exists()) {
      authStatus.textContent = "Username already exists.";
    } else {
      // Save new user
      await set(userRef, { password });
      // Log in user after registration
      currentUser = { username, password };
      localStorage.setItem('user', JSON.stringify(currentUser));
      showApp();
    }
  };

  // Show app after login
  function showApp() {
    authSection.style.display = 'none';
    document.getElementById('app-section').style.display = 'block';
    document.getElementById('user-name-display').textContent = currentUser.username;
    loadComments();
  }

  // Logout
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem('user');
    currentUser = null;
    authSection.style.display = 'block';
    document.getElementById('app-section').style.display = 'none';
  };

  // Load comments
  function loadComments() {
    const commentsRef = ref(db, 'comments');
    onValue(commentsRef, snapshot => {
      commentsList.innerHTML = '';
      snapshot.forEach(child => {
        const comment = child.val();
        const div = document.createElement('div');
        div.className = 'comment';
        div.innerHTML = `<strong>${comment.username}:</strong> ${comment.text}`;
        commentsList.appendChild(div);
      });
    });
  }

  // Post comment
  commentForm.onsubmit = e => {
    e.preventDefault();
    if (!currentUser) {
      alert("Login first.");
      return;
    }
    const text = commentInput.value.trim();
    if (!text) return;
    push(ref(db, 'comments'), { text, username: currentUser.username });
    commentInput.value = '';
  };

  // Download button
  document.getElementById('downloadBtn').onclick = () => {
    window.location.href = "https://www.meta.com/experiences/spec-taggerz-v2/1173072012561564/";
  };
</script>

<!-- Footer -->
<div style="text-align: center; margin-top: 20px; font-style: italic; color: white;">
  Made by evil90
</div>

</body>
</html>
